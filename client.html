<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>影片交付清單</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --G:#1a4a1a;--Gm:#2d6e2d;--Gp:#e8f2e8;--Gw:#f2f7f2;
  --ink:#111;--ink2:#444;--ink3:#888;
  --border:#e0e8e0;--white:#fff;
  --warn:#c45000;--warnbg:#fff4ec;
  --ff:-apple-system,BlinkMacSystemFont,'PingFang TC','Microsoft JhengHei',sans-serif;
  --mono:'SF Mono','Consolas',monospace
}
html{-webkit-text-size-adjust:100%}
body{background:#f5f5f0;color:var(--ink);font-family:var(--ff);font-size:15px;line-height:1.6;min-height:100vh;padding-bottom:env(safe-area-inset-bottom,24px)}

/* ── HEADER ── */
.header{background:var(--G);color:#fff;padding:16px 20px 14px;padding-top:calc(16px + env(safe-area-inset-top,0px));position:sticky;top:0;z-index:100}
.header-brand{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;opacity:.45;margin-bottom:4px}
.header-title{font-size:18px;font-weight:700;line-height:1.2;margin-bottom:2px}
.header-sub{font-size:12px;opacity:.6}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);margin-bottom:16px}
.stat{background:var(--white);padding:14px 12px;text-align:center}
.stat-n{font-size:24px;font-weight:700;color:var(--G);line-height:1}
.stat-l{font-size:11px;color:var(--ink3);margin-top:3px}

/* ── CONTENT ── */
.content{padding:0 14px}

/* ── CARD ── */
.card{background:var(--white);border-radius:14px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-head{padding:16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.card-head:active{background:#f8fdf8}
.card.open .card-head{background:#f8fdf8}
.head-left{flex:1;min-width:0}
.vid-num{font-size:11px;font-family:var(--mono);color:var(--ink3);margin-bottom:3px}
.vid-title{font-size:15px;font-weight:700;color:var(--ink);line-height:1.3;word-break:break-all}
.head-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.chev{font-size:16px;color:var(--ink3);transition:transform .2s;line-height:1;margin-top:2px}
.card.open .chev{transform:rotate(90deg)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.b-done{background:#eaf3de;color:#27500a}
.b-review{background:#e1f5ee;color:#085041}
.b-editing{background:#eeedfe;color:#3c3489}
.b-pending{background:#f5f0ff;color:#5b4ab0}
.b-waiting{background:#f0f0f0;color:#666}
.dl-mark{font-size:11px;font-weight:600;color:#27500a;background:#eaf3de;padding:3px 8px;border-radius:10px}

/* ── CARD BODY ── */
.card-body{display:none;border-top:1px solid var(--border);padding:16px}
.card.open .card-body{display:block}

.sec-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:1.5px;color:var(--G);font-weight:600;margin-bottom:8px}

/* ── 文案區 ── */
.copy-area{background:#f8f8f5;border:1px solid var(--border);border-radius:10px;padding:14px;font-size:14px;color:var(--ink2);line-height:1.7;white-space:pre-line;margin-bottom:10px;word-break:break-all}

/* ── BUTTONS ── */
.btns{display:flex;flex-direction:column;gap:8px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 16px;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;cursor:pointer;border:none;font-family:var(--ff);-webkit-tap-highlight-color:transparent;transition:opacity .12s;width:100%}
.btn:active{opacity:.75}
.btn-copy{background:var(--Gw);color:var(--G);border:1.5px solid #b8d4b8}
.btn-dl{background:var(--G);color:#fff}
.btn-dl.downloaded{background:#27500a}
.btn-publish{background:#fff;color:var(--ink2);border:1.5px solid var(--border)}
.hint{font-size:11px;color:var(--ink3);text-align:center;margin-top:6px}

/* ── NOT READY ── */
.not-ready{padding:20px 16px;text-align:center;color:var(--ink3)}
.not-ready-icon{font-size:28px;margin-bottom:8px}
.not-ready-txt{font-size:13px;line-height:1.6}

/* ── FOOTER ── */
.footer{text-align:center;padding:24px 20px;font-size:11px;color:var(--ink3);font-family:var(--mono)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(8px);background:var(--G);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--ink3)}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">VIDPRO · 影片交付清單</div>
  <div class="header-title" id="h-title">載入中…</div>
  <div class="header-sub" id="h-sub"></div>
</header>

<div class="stats" id="stats-bar" style="display:none">
  <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">已交付</div></div>
  <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">總計</div></div>
  <div class="stat"><div class="stat-n" id="s-dl">0</div><div class="stat-l">已下載</div></div>
</div>

<div class="content" id="content">
  <div class="loading">
    <div style="font-size:32px">⏳</div>
    <div>載入中</div>
  </div>
</div>

<div class="footer">VIDPRO 短影音後製</div>
<div class="toast" id="toast"></div>

<script>
const SK='vidpro_v3';
const DL_KEY='vidpro_client_dl';

const params=new URLSearchParams(window.location.search);
const PROJECT_ID=params.get('project')||'';
const CLIENT_NAME=params.get('client')||'';

function toast(m,d=2000){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}

function nl2br(t){
  if(!t)return'';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/\\\\n/g,'\n').replace(/\n/g,'<br>');
}

// Download record stored in localStorage per client
function getDLRecord(){
  try{return JSON.parse(localStorage.getItem(DL_KEY)||'{}')}catch{return{}}
}
function markDownloaded(vid){
  const r=getDLRecord();r[vid]=new Date().toISOString().split('T')[0];
  localStorage.setItem(DL_KEY,JSON.stringify(r));
}
function isDownloaded(vid){return !!getDLRecord()[vid]}

function statusBadge(s){
  const map={
    '已交付':'b-done 已交付','已歸檔':'b-done 已交付',
    '審核中':'b-review 審核中','剪輯中':'b-editing 剪輯中',
    '待剪輯':'b-pending 待剪輯','素材整理':'b-waiting 準備中'
  };
  const v=map[s]||'b-waiting '+s;
  const [cls,label]=v.split(' ');
  return`<span class="badge ${cls}">${label}</span>`;
}

function render(){
  let DB={};
  try{const r=localStorage.getItem(SK);DB=r?JSON.parse(r):{};}catch{}

  if(!PROJECT_ID){
    document.getElementById('h-title').textContent='沒有指定專案';
    document.getElementById('content').innerHTML=`<div class="loading"><div style="font-size:32px">🔗</div><div style="font-size:14px;text-align:center">請使用您的專屬連結<br>若有疑問請聯絡我們</div></div>`;
    return;
  }

  const proj=(DB.projects||[]).find(p=>p.id===PROJECT_ID);
  const videos=(DB.videos||[]).filter(v=>v.project_id===PROJECT_ID);

  // Header
  const clientCode=proj?.client_code||'';
  const client=(DB.clients||[]).find(c=>c.code===clientCode);
  const displayName=CLIENT_NAME||client?.name||PROJECT_ID;

  document.getElementById('h-title').textContent=displayName;
  document.getElementById('h-sub').textContent=`專案 ${PROJECT_ID} · 共 ${videos.length} 支影片`;

  // Stats
  const delivered=videos.filter(v=>['已交付','已歸檔'].includes(v.status));
  const dlCount=delivered.filter(v=>isDownloaded(v.video_id)).length;
  document.getElementById('s-done').textContent=delivered.length;
  document.getElementById('s-total').textContent=videos.length;
  document.getElementById('s-dl').textContent=dlCount;
  document.getElementById('stats-bar').style.display='grid';

  if(videos.length===0){
    document.getElementById('content').innerHTML=`<div class="loading"><div style="font-size:32px">📋</div><div>尚無影片紀錄</div></div>`;
    return;
  }

  // Sort: delivered first
  const order={已歸檔:0,已交付:1,審核中:2,剪輯中:3,待剪輯:4,素材整理:5};
  const sorted=[...videos].sort((a,b)=>(order[a.status]||9)-(order[b.status]||9));

  const html=sorted.map((v,i)=>{
    const isReady=['已交付','已歸檔'].includes(v.status);
    const dl=isDownloaded(v.video_id);
    const sid=v.video_id.replace(/[^a-z0-9]/gi,'_');

    // Find script for copywriting
    const script=(DB.scripts||[]).find(s=>s.video_id===v.video_id);
    const copyText=script?.copywriting||'';

    const bodyHtml=isReady?`
      ${copyText?`
        <div class="sec-label">IG 文案</div>
        <div class="copy-area" id="ca-${sid}">${e(copyText).replace(/\\\\n/g,'<br>').replace(/\n/g,'<br>')}</div>
      `:''}
      <div class="btns">
        <button class="btn btn-copy" onclick="copyCopy('${sid}')">複製文案</button>
        ${v.final_link
          ?`<a class="btn btn-dl${dl?' downloaded':''}" href="${v.final_link}" target="_blank" onclick="onDL('${v.video_id}')">
              ${dl?'✓ 已下載':'↓ 下載完成檔'}
            </a>`
          :`<button class="btn btn-dl" style="opacity:.45" disabled>完成檔準備中</button>`
        }
        ${v.publish_link?`<a class="btn btn-publish" href="${v.publish_link}" target="_blank">▷ 查看已發布影片</a>`:''}
      </div>
      ${v.final_link?`<div class="hint">下載後系統會自動記錄</div>`:''}
    `:`<div class="not-ready"><div class="not-ready-icon">⏳</div><div class="not-ready-txt">這支影片目前${v.status}中<br>完成後會更新狀態</div></div>`;

    return`<div class="card" id="card-${sid}">
      <div class="card-head" onclick="toggleCard('${sid}')">
        <div class="head-left">
          <div class="vid-num">${String(i+1).padStart(2,'0')}</div>
          <div class="vid-title">${e(v.title)}</div>
        </div>
        <div class="head-right">
          ${statusBadge(v.status)}
          ${dl?`<span class="dl-mark">✓ 已下載</span>`:''}
          <span class="chev">›</span>
        </div>
      </div>
      <div class="card-body">${bodyHtml}</div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=html;

  // Auto-open first delivered card
  const first=sorted.find(v=>['已交付','已歸檔'].includes(v.status));
  if(first&&!isDownloaded(first.video_id)){
    const sid=first.video_id.replace(/[^a-z0-9]/gi,'_');
    const c=document.getElementById('card-'+sid);
    if(c)c.classList.add('open');
  }
}

function toggleCard(sid){
  const c=document.getElementById('card-'+sid);
  if(c)c.classList.toggle('open');
}

function copyCopy(sid){
  const el=document.getElementById('ca-'+sid);
  if(!el){toast('沒有文案可複製');return;}
  const text=el.innerText||el.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>toast('文案已複製 ✓')).catch(()=>fallbackCopy(text));
  } else { fallbackCopy(text); }
}

function fallbackCopy(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('文案已複製 ✓');}catch{toast('請長按文字手動複製');}
  document.body.removeChild(ta);
}

function onDL(vid){
  markDownloaded(vid);
  setTimeout(()=>render(),300);
  toast('已記錄下載 ✓');
}

render();
</script>
</body>
</html>
